[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Homepage
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/comprar"
  to = "/checkout.html"
  status = 200

# Block direct .html access
[[redirects]]
  from = "/checkout.html"
  to = "/comprar?ref=a8k2m4"
  status = 301

# API routes -> Netlify Functions
[[redirects]]
  from = "/api/pix"
  to = "/.netlify/functions/pix"
  status = 200

[[redirects]]
  from = "/api/pix.php"
  to = "/.netlify/functions/pix"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/webhook.php"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/products"
  to = "/.netlify/functions/products"
  status = 200

[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin_api"
  status = 200

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai_generator"
  status = 200

# Catch-all: any slug -> produto.html (must be LAST)
[[redirects]]
  from = "/*"
  to = "/produto.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
