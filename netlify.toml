[build]
  publish = "static_site"

[functions]
  directory = "netlify/functions"

# URL rewrites
[[redirects]]
  from = "/comprar"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/checkout.html"
  to = "/comprar?ref=a8k2m4"
  status = 301

# API proxy to Netlify Functions
[[redirects]]
  from = "/api/pix"
  to = "/.netlify/functions/pix"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

# Block direct access to sensitive files
[[redirects]]
  from = "/api/pix.php"
  to = "/.netlify/functions/pix"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
